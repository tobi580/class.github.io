<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=0.5" />
    <title>HAPPY BIRTHDAY PRAISE.</title>
    <script>
      function myfunction() {
        document.getElementById("form").innerHTML =
          "HAPPY BIRTHDAY NWANBUASO PRAISE AMARACHUKU";
        document.getElementById("praise").style.backgroundColor = "red";
        document.getElementById("praise").style.color = "blue";
      }

      function myname() {
        document.getElementById("the").innerHTML =
          "Here's to another year of adventures, inside jokes, and unwavering support for each other. You're not just a friend, you're family, and I cherish our bond more than words can say. Thank you for being the most amazing person I know, for always knowing how to make me laugh, and for always being there, no matter what.I hope your birthday is filled with everything you love, from delicious food to unforgettable moments with the people you care about most. May this year be your best one yet, and I can't wait to celebrate all the amazing things you'll achieve. I'm so lucky to have you in my life, and I'm forever grateful for our friendship. Happy birthday, my dearest friend! ";
        document.getElementById("praise").style.margin = "100px 50px";
        document.getElementById("praise").style.backgroundColor = "blue";
        document.getElementById("praise").style.color = "gold";
      }
    </script>
    <style>
      #praise {
        border: solid 5px rgba(230, 173, 176, 0.842);
        border-radius: 15px;
        margin: 150px 200px;
        text-shadow: 10px;
        color: rgba(255, 30, 0, 0.808);
        padding: 15px;
      }
      body {
        background-color: rgb(0, 255, 157);
      }
      #form {
        text-align: center;
      }
       
    </style>
  </head>
  <body id="praise">
    <article id="the">
      <form id="form">
        <label for="name">Your Name:</label><br />
        <input type="text" name="name" placeholder="PRAISE" /><br />
        <label for="password">Password:</label><br />
        <input type="password" name="password" /><br />
        <label for="birthday">Birthday:</label><br />
        <input type="date" />

        <button type="button" onclick="myfunction()">Submit</button>
      </form>
      <button type="button" onclick="myname()">Read More</button>
    </article>
  </body>
</html>
